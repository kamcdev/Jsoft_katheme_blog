<!DOCTYPE html>
<html lang="zh">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ blogname }} - 个人博客</title>
    <link rel="stylesheet" href="/css/index/index.css">
    <link rel="icon" href="/css/all/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/css/all/favicon.ico" type="image/x-icon">

<body>
    <div class="container">
        <div class="center-section">
            <h1>文章列表</h1>
            <div class="category-tabs" id="categoryTabs">

                    <!-- 分类标签将通过JavaScript动态添加 -->
                </div>
                <div class="category-tabs-nav category-tabs-nav-prev" id="categoryTabsPrev">‹</div>

            <div class="blog-list" id="blogList">
                
            </div>
        </div>
        
        <!-- 友情链接容器 -->
        <div class="center-section">
            <h2>友情链接</h2>
            <div class="friendly-links-container">
                <div class="friendly-links-list" id="friendlyLinksList">
                    <!-- 友情链接将通过JavaScript动态添加 -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/index/index.js"></script>
